name: Daily ESG News Scraper

on:
  schedule:
    # Runs at 6:00 AM IST (12:30 AM UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:  # Manual trigger for testing

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  POWER_AUTOMATE_WEBHOOK: ${{ secrets.POWER_AUTOMATE_WEBHOOK }}

jobs:
  scrape-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Fetch keywords from SharePoint
        id: get_keywords
        env:
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        run: |
          python scripts/fetch_keywords.py
      
      - name: Fetch sources from SharePoint
        id: get_sources
        env:
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        run: |
          python scripts/fetch_sources.py
      
      - name: Scrape all sources
        id: scrape
        run: |
          python scripts/scrape_all.py
      
      - name: Summarize with Claude AI
        id: summarize
        run: |
          python scripts/summarize_articles.py
      
      - name: Send to Power Automate
        run: |
          python scripts/send_to_power_automate.py
      
      - name: Upload artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraping-results-${{ github.run_number }}
          path: |
            data/articles.json
            data/summaries.json
            logs/
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::ESG scraper failed. Check logs."
          # Optional: Send notification to Teams/Slack
